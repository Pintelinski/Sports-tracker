version: "3.9"

services:
  web:
    build: .
    restart: always
    env_file: .env
    volumes:
      - static_volume:/app/static
      - media_volume:/app/images
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - media_volume:/app/images
    depends_on:
      - web

volumes:
  static_volume:
  media_volume: