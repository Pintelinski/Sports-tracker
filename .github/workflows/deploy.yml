name: CI/CD to EduCloud VM

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  deploy:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Check secrets exist
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          PORT: ${{ secrets.PORT }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          test -n "$HOST" || (echo "HOST is empty" && exit 1)
          test -n "$USERNAME" || (echo "USERNAME is empty" && exit 1)
          test -n "$PORT" || (echo "PORT is empty" && exit 1)
          test -n "$SSH_KEY" || (echo "SSH_KEY is empty" && exit 1)
          echo "Secrets are present"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            cd /home/apps/Sports-tracker
            git fetch origin
            git reset --hard origin/main
            sudo docker compose up -d --build
            sudo docker image prune -f

  trigger-e2e:
    name: Trigger E2E Playwright tests
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Dispatch e2e.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/e2e.yml/dispatches" \
            -d '{"ref":"main"}'
