{% extends 'main.html' %}
{% block content %}


        <div class="BackButton">
            <a href="{% url 'training-info' training.id %}">&#10094; Back</a>
        </div>
        <div>
            <h3>Edit training</h3>
        </div>

    <form class="basicForm" method="POST">
        {% csrf_token %}

        {% for field in form %}
            <div class="form__field">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}

                {% if field.help_text %}
                    <small>{{ field.help_text }}</small>
                {% endif %}

                {% for error in field.errors %}
                    <p style="color: red;">{{ error }}</p>
                {% endfor %}
            </div>
        {% endfor %}

        <input class="btn btn--sub btn--lg" type="submit" value="Edit training" />
    </form>



{% endblock content %}
