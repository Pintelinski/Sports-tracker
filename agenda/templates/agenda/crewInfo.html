{% extends 'main.html' %}
{% block content %}


<div class="BackButton">
    <a href="{% url 'crews' %}">&#10094; Back</a>
</div>
<h2>Crew members of {{ crew.name }}:</h2>
<ul class="profile-picker">
{% for member in members %}
    <li>
        <a href="{% url 'user-profile' member.profile.id %}" class="crew-member">
            <img src="{{ member.profile.profile_image.url }}" class="small-img"/>
            <span class="crew-member__name">{{ member.profile }} - {{ member.role }}</span>
        </a>
    </li>
{% endfor %}
</ul>

{% if request.user.is_authenticated %}
<a href="{% url 'add-member-to-crew' crew.id %}"><p>Add members</p></a>
{% endif %}

{% endblock content %}
